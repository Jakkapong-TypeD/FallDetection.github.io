<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FallGuard Family — กล้องมือถือ</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .phone-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .phone-card {
    width: 100%;
    max-width: 420px;
    background: #1A2A30;
    border-radius: var(--radius, 16px);
    padding: 24px 22px;
    box-sizing: border-box;
  }
  .phone-card h1 {
    font-size: 19px;
    margin: 12px 0 4px;
    color: #E8EEF0;
  }
  .phone-group-line {
    font-size: 13px;
    color: #A8C4CC;
    margin: 0 0 18px;
  }
  .phone-video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    background: #0D1A1F;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone-video-wrapper video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .phone-video-placeholder {
    color: #5A7A82;
    font-size: 13px;
    text-align: center;
    padding: 0 20px;
  }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #A8C4CC;
    margin-bottom: 16px;
  }
  .conn-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #888;
    flex-shrink: 0;
  }
  .conn-dot.online {
    background: #4CAF50;
    box-shadow: 0 0 6px #4CAF50;
  }
  .phone-error {
    font-size: 13px;
    color: #E85C4A;
    margin-bottom: 14px;
  }
  .phone-actions { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>

  <div class="phone-page">
    <div class="phone-card">
      <div class="brand">
        <div class="brand-mark">
          <span class="pulse-ring"></span>
          <span class="pulse-dot"></span>
        </div>
        <h1>กล้องมือถือ</h1>
        <p class="phone-group-line">กลุ่มบ้าน: <span id="phone-group-name">กำลังโหลด...</span></p>
      </div>

      <div class="phone-video-wrapper">
        <video id="local-preview" autoplay playsinline muted style="display:none"></video>
        <p class="phone-video-placeholder" id="video-placeholder">
          กดปุ่ม "เริ่มส่งภาพ" แล้วอนุญาตให้เว็บนี้ใช้กล้องของเครื่อง
        </p>
      </div>

      <div class="conn-status">
        <span class="conn-dot" id="conn-dot"></span>
        <span id="conn-text">ยังไม่ได้เริ่มส่งภาพ</span>
      </div>

      <p class="error-text phone-error" id="phone-error" hidden></p>

      <div class="phone-actions">
        <button id="btn-start-broadcast" class="btn btn-primary" disabled>เริ่มส่งภาพ</button>
        <button id="btn-stop-broadcast" class="btn btn-ghost" hidden>หยุดส่งภาพ</button>
      </div>
    </div>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="phone-camera.js"></script>
</body>
</html>
